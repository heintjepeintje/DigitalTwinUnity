name: Aikido Security Scan

on:
  pull_request:
    branches: [ "main" ]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Aikido scan
        uses: aikidosecurity/aikido-action@v1
        with:
          api_key: ${{ secrets.AIKIDO_API_KEY }}
